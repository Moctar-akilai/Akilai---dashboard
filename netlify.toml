[build]
  command   = "mkdir -p dist && cp index.html dist/index.html && cp admin.html dist/admin.html && cp booking.html dist/booking.html && cp gerer-rdv.html dist/gerer-rdv.html && npm install --prefix netlify/functions/generate-invoice"
  functions = "netlify/functions"
  publish   = "dist"

[functions]
  node_bundler = "nft"

[functions."notify-weekly-report"]
  schedule = "0 8 * * 1"

[functions."cron-relances"]
  schedule = "0 9 * * *"

[functions."cron-reminder-rdv"]
  schedule = "0 8 * * *"

[functions."cron-relance-inactifs"]
  schedule = "0 9 * * 1"

[functions."cron-post-rdv-feedback"]
  schedule = "0 */2 * * *"

[functions."generate-invoice"]
  node_bundler = "esbuild"

# Variables d'environnement à configurer dans Netlify → Site settings → Env vars :
#   AIRTABLE_API_KEY   — clé API Airtable
#   AIRTABLE_BASE_ID   — ID de la base Airtable (commence par "app...")
#   RESEND_API_KEY     — clé API Resend
#   ADMIN_EMAIL        — email destinataire des alertes (ex: diopmohamed92@gmail.com)
#   URL                — URL du site Netlify (automatique Netlify, ne pas définir manuellement)
#   MAKE_API_KEY       — clé API Make (ex: token depuis Make → Account → API)
#   VAPI_API_KEY                   — clé API Vapi (depuis dashboard.vapi.ai)
#   ELEVENLABS_API_KEY             — clé API ElevenLabs (depuis elevenlabs.io → Profile → API key)
#   ADMIN_PASSWORD                 — mot de passe de la page admin /#admin
#   NETLIFY_IDENTITY_SERVICE_ROLE  — JWT service role Netlify Identity (Netlify → Identity → Settings → Service role JWT)
#   CLOUDINARY_CLOUD_NAME          — nom du cloud Cloudinary
#   CLOUDINARY_API_KEY             — clé API Cloudinary
#   CLOUDINARY_API_SECRET          — secret API Cloudinary
#   Note : VAPI_ASSISTANT_ID n'est plus utilisé — chaque client a son propre ID dans Airtable (champ VapiAssistantId)
#
#   — Offre RDV (crons SMS/WhatsApp) —
#   TWILIO_ACCOUNT_SID     — SID du compte Twilio (commence par AC...)
#   TWILIO_AUTH_TOKEN      — Token d'auth Twilio
#   TWILIO_FROM_NUMBER     — Numéro SMS Twilio (ex: +33XXXXXXXXX)
#   TWILIO_WHATSAPP_NUMBER — Numéro WhatsApp Twilio (ex: +14155238886 pour sandbox)
#   GOOGLE_CLIENT_ID       — OAuth2 client ID Google (pour Google Calendar)
#   GOOGLE_CLIENT_SECRET   — OAuth2 client secret Google
